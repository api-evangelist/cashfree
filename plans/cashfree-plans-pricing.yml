        rate: "1.95%"
      - method: Wallets
        rate: "1.95%"
      - method: Credit Card EMI
        rate: "1.90% + 0.25%"
      - method: Debit Card EMI (HDFC)
        rate: "1.50%"
      - method: Cardless EMI
        rate: "1.90%"
      - method: Pay Later
        rate: "2.20%"
      - method: International Visa/Mastercard
        rate: "2.99%"
